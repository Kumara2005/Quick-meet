<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="QuickMeet — Instant 1-on-1 video calls in your browser. No sign-up required.">
  <title>QuickMeet — Start or Join a Call</title>

  <!-- Google Font: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/home.css">
</head>
<body>
  <main class="home">
    <!-- Top: Logo, Title, Description -->
    <header class="home__header">
      <div class="home__logo" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="23 7 16 12 23 17 23 7"></polygon>
          <rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect>
        </svg>
      </div>
      <h1 class="home__title">QuickMeet</h1>
      <p class="home__description">
        Connect instantly with anyone, anywhere. Free 1-on-1 video calls — no downloads, no sign-up.
      </p>
    </header>

    <!-- Center Card: Create / Join -->
    <section class="card home__card" aria-label="Get started">
      <button
        id="create-room-btn"
        type="button"
        class="btn btn--primary btn--lg"
      >
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
        Create Room
      </button>

      <div class="divider" role="separator" aria-label="or">or</div>

      <div class="home__join">
        <label class="home__join-label" for="room-code-input">Enter a room code to join</label>
        <input
          id="room-code-input"
          class="input input--code"
          type="text"
          placeholder="ABX-392"
          maxlength="7"
          autocomplete="off"
          spellcheck="false"
          aria-describedby="room-code-hint"
        >
        <span id="room-code-hint" class="sr-only">Enter the room code shared with you</span>
        <button
          id="join-room-btn"
          type="button"
          class="btn btn--secondary btn--lg"
        >
          Join Room
        </button>
      </div>
    </section>

    <!-- Footer -->
    <footer class="home__footer">
      <p class="home__copyright">&copy; 2026 QuickMeet. All rights reserved.</p>
    </footer>
  </main>

  <script type="module" src="js/home.js"></script>
</body>
</html>
