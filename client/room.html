<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="QuickMeet — Waiting room for your video call.">
  <title>QuickMeet — Room</title>

  <!-- Google Font: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/room.css">
</head>
<body>
  <div id="app" class="room">
    <!-- Main content: Video area + Info panel -->
    <div class="room__layout">
      <!-- Video Area -->
      <section class="room__video-area" aria-label="Camera preview">
        <!-- Connection health badge (Phase 8) -->
        <div
          id="health-badge"
          class="health-badge health-badge--hidden"
          hidden
          role="status"
          aria-live="polite"
        >
          <button
            id="health-badge-toggle"
            type="button"
            class="health-badge__main"
            aria-expanded="false"
            aria-controls="health-badge-details"
          >
            <span id="health-badge-dot" class="health-badge__dot" aria-hidden="true">⚫</span>
            <span class="health-badge__content">
              <span id="health-badge-label" class="health-badge__label">Disconnected</span>
              <span class="health-badge__metrics">
                <span class="health-badge__metric" title="Round-trip latency">
                  <span class="health-badge__metric-key">RTT</span>
                  <span id="health-badge-latency" class="health-badge__metric-val">—</span>
                </span>
                <span class="health-badge__metric" title="Packet loss">
                  <span class="health-badge__metric-key">Loss</span>
                  <span id="health-badge-loss" class="health-badge__metric-val">—</span>
                </span>
              </span>
            </span>
          </button>
          <div id="health-badge-details" class="health-badge__details" hidden></div>
        </div>

        <div id="video-preview" class="video-preview">
          <!-- Loading state -->
          <div id="media-loading" class="media-loading" aria-live="polite">
            <div class="media-loading__spinner" aria-hidden="true"></div>
            <p class="media-loading__text">Starting camera…</p>
          </div>

          <!-- Placeholder (shown on error or before permission) -->
          <div id="video-placeholder" class="video-preview__placeholder" hidden>
            <div class="video-preview__icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                <path d="M23 7l-7 5 7 5V7z"></path>
                <rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect>
              </svg>
            </div>
            <p id="video-placeholder-label" class="video-preview__label">Camera Preview</p>
            <p id="video-placeholder-hint" class="video-preview__hint">Your camera will appear here</p>
          </div>

          <!-- Remote participant video (Phase 5) -->
          <video
            id="remoteVideo"
            class="video-preview__remote"
            autoplay
            playsinline
            aria-label="Remote participant video"
          ></video>

          <!-- Local video preview (Phase 4) -->
          <video
            id="localVideo"
            class="video-preview__video video-preview__local"
            autoplay
            playsinline
            muted
            aria-label="Your camera preview"
          ></video>
        </div>
      </section>

      <!-- Information Panel -->
      <aside class="room__info-panel" aria-label="Room information">
        <div class="card info-card">
          <!-- Room Code -->
          <div class="info-card__section">
            <span class="info-card__label">Room Code</span>
            <div class="info-card__room-code-row">
              <span id="room-code-display" class="info-card__room-code">ABX-392</span>
              <button
                id="copy-room-code-btn"
                type="button"
                class="btn btn--ghost info-card__copy-btn"
                aria-label="Copy room code"
              >
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                  <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                </svg>
              </button>
            </div>
          </div>

          <!-- Status -->
          <div class="info-card__section">
            <span class="info-card__label">Status</span>
            <div class="info-card__status">
              <span id="waiting-badge" class="badge badge--waiting">
                <span class="badge__dot" aria-hidden="true"></span>
                Waiting
              </span>
              <p id="status-text" class="info-card__status-text">
                Waiting for another participant…
              </p>
            </div>
          </div>
        </div>
      </aside>
    </div>

    <!-- Toolbar -->
    <footer id="toolbar" class="room__toolbar" role="toolbar" aria-label="Call controls">
      <div class="room__toolbar-group">
        <!-- Mute -->
        <button
          id="btn-mute"
          type="button"
          class="btn btn--icon btn--active"
          aria-label="Mute microphone"
          aria-pressed="false"
          title="Mute Microphone (M)"
        >
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
            <line x1="12" y1="19" x2="12" y2="23"></line>
            <line x1="8" y1="23" x2="16" y2="23"></line>
          </svg>
        </button>

        <!-- Camera -->
        <button
          id="btn-camera"
          type="button"
          class="btn btn--icon btn--active"
          aria-label="Turn camera off"
          aria-pressed="true"
          title="Turn Camera Off (V)"
        >
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M23 7l-7 5 7 5V7z"></path>
            <rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect>
          </svg>
        </button>

        <!-- Screen Share -->
        <button
          id="btn-screen-share"
          type="button"
          class="btn btn--icon"
          aria-label="Share screen"
          aria-pressed="false"
          disabled
          title="Share Screen (S)"
        >
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
            <line x1="8" y1="21" x2="16" y2="21"></line>
            <line x1="12" y1="17" x2="12" y2="21"></line>
          </svg>
        </button>
      </div>

      <div class="room__toolbar-divider" aria-hidden="true"></div>

      <div class="room__toolbar-group">
        <!-- Device Settings (Phase 9) -->
        <button
          id="btn-settings"
          type="button"
          class="btn btn--icon"
          aria-label="Audio and video settings"
          title="Device Settings (Ctrl+,)"
          disabled
        >
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
          </svg>
        </button>
      </div>

      <div class="room__toolbar-divider" aria-hidden="true"></div>

      <!-- End Call -->
      <button
        id="btn-end-call"
        type="button"
        class="btn btn--icon"
        aria-label="End call"
        title="End Call"
      >
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M10.68 13.31a16 16 0 0 0 3.41 2.6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7 2 2 0 0 1 1.72 2v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.42 19.42 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91"></path>
          <line x1="23" y1="1" x2="1" y2="23"></line>
        </svg>
      </button>
    </footer>

    <div id="notification-area" class="notification-area" aria-live="polite"></div>
  </div>

  <!-- Device Settings Modal (Phase 9) -->
  <div
    id="settings-modal"
    class="settings-modal"
    role="dialog"
    aria-modal="true"
    aria-labelledby="settings-modal-title"
    aria-hidden="true"
    hidden
  >
    <div class="settings-modal__backdrop" data-dismiss="settings"></div>
    <div class="settings-modal__panel card">
      <header class="settings-modal__header">
        <h2 id="settings-modal-title" class="settings-modal__title">Audio &amp; Video Settings</h2>
        <button
          id="settings-close-btn"
          type="button"
          class="btn btn--ghost settings-modal__close"
          aria-label="Close settings"
        >
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </header>

      <div class="settings-modal__body">
        <div class="settings-modal__preview-wrap">
          <video
            id="settings-preview-video"
            class="settings-modal__preview"
            autoplay
            playsinline
            muted
            aria-label="Camera preview for selected device"
          ></video>
          <span class="settings-modal__preview-label">Camera preview</span>
        </div>

        <div class="settings-modal__field">
          <label class="settings-modal__label" for="settings-camera-select">Camera</label>
          <select id="settings-camera-select" class="settings-modal__select"></select>
        </div>

        <div class="settings-modal__field">
          <label class="settings-modal__label" for="settings-mic-select">Microphone</label>
          <select id="settings-mic-select" class="settings-modal__select"></select>
        </div>
      </div>

      <footer class="settings-modal__footer">
        <button id="settings-cancel-btn" type="button" class="btn btn--ghost">Cancel</button>
        <button id="settings-apply-btn" type="button" class="btn btn--primary">Apply</button>
      </footer>
    </div>
  </div>

  <script type="module" src="js/room.js"></script>
</body>
</html>
